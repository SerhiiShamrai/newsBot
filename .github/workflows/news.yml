# GitHub Actions workflow для перевірки новин
# Запуск двічі на день: 6:00 та 18:00 за Києвом (UTC+3)
# Це відповідає 3:00 та 15:00 UTC

name: News Checker

on:
  schedule:
    # 6:00 Києва = 3:00 UTC
    - cron: "0 3 * * *"
    # 18:00 Києви = 15:00 UTC
    - cron: "0 15 * * *"
  workflow_dispatch:  # Дозволяє вручну запустити перевірку

jobs:
  check-news:
    runs-on: ubuntu-latest
    
    steps:
      # Крок 1: Завантаження репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # Крок 2: Встановлення Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      # Крок 3: Встановлення залежностей (включаючи sentence-transformers)
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          echo "✅ Залежності встановлено"
      
      # Крок 4: Запуск перевірки новин
      - name: Run news checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
        run: |
          python main.py
          echo "✅ Перевірка новин завершена"
      
      # Крок 5: Commit та push змін published.json (якщо вони були)
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Перевірка, чи є зміни в published.json
          if [ -f published.json ]; then
            if git diff --quiet published.json; then
              echo "ℹ️ published.json не змінився або ще не існує."
            else
              git add published.json
              git commit -m "Update: new news published" -a || echo "No changes to commit"
              git push
              echo "✅ Зміни опубліковано в репозиторії"
            fi
          else
            echo "ℹ️ Файл published.json ще не існує."
          fi